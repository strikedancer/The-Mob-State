name: Doc Sync Guard

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate-doc-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run doc sync guard
        run: node tools/doc_sync_guard.js --all
