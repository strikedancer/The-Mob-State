server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header Content-Security-Policy "upgrade-insecure-requests; block-all-mixed-content" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compatibility aliases for old/wrong asset paths.
    location ^~ /assets/images/ {
        alias /usr/share/nginx/html/assets/assets/images/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ^~ /assets/image/ {
        alias /usr/share/nginx/html/assets/assets/images/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Stable public image route for web helper fallbacks across gameplay modules.
    location ^~ /images/ {
        alias /usr/share/nginx/html/assets/assets/images/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}