name: mafia_game_client
description: "The Mob State - A multiplayer crime empire game."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.10.7

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  
  # HTTP client for API calls
  http: ^1.2.0
  
  # State management
  provider: ^6.1.1
  
  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  
  # Secure storage for JWT tokens
  flutter_secure_storage: ^9.0.0
  
  # Open external URLs (Stripe checkout, etc.)
  url_launcher: ^6.3.0
  
  # Time ago formatting
  timeago: ^3.7.0

  # Persist lightweight UI preferences (e.g. legend expanded/collapsed)
  shared_preferences: ^2.5.3
  
  # Push notifications (FCM)
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1
  
  # JSON serialization
  json_annotation: ^4.9.0
  
  # Video player
  video_player: ^2.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  
  # JSON code generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  
  # Enable generation of localization files
  generate: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/images/achievements/
    - assets/images/achievements/badges/
    - assets/images/achievements/badges/crimes/
    - assets/images/achievements/badges/drugs/
    - assets/images/achievements/badges/jobs/
    - assets/images/achievements/badges/legacy/
    - assets/images/achievements/badges/mastery/
    - assets/images/achievements/badges/power/
    - assets/images/achievements/badges/prostitution/
    - assets/images/achievements/badges/school/
    - assets/images/achievements/badges/social/
    - assets/images/achievements/badges/trade/
    - assets/images/achievements/badges/travel/
    - assets/images/achievements/badges/vehicles/
    - assets/images/ammo/
    - assets/images/avatars/
    - assets/images/backgrounds/
    - assets/images/casino/
    - assets/images/crypto/
    - assets/images/crypto/icons/
    - assets/images/crimes/
    - assets/images/drugs/
    - assets/images/facilities/
    - assets/images/homes/
    - assets/images/jobs/
    - assets/images/materials/
    - assets/images/overlays/
    - assets/images/properties/
    - assets/images/prostitution/
    - assets/images/prostitution/portraits/
    - assets/images/prostitution/vip_portraits/
    - assets/images/prostitution/buildings/
    - assets/images/prostitution/windows/
    - assets/images/prostitution/backgrounds/
    - assets/images/prostitution/animation/
    - assets/images/prostitution/interiors/
    - assets/images/prostitution/icons/
    - assets/images/crew_hq/camping/
    - assets/images/crew_hq/rural/
    - assets/images/crew_hq/city/
    - assets/images/crew_hq/villa/
    - assets/images/crew_hq/vip/
    - assets/images/school/
    - assets/images/tools/
    - assets/images/travel/
    - assets/images/tuneshop/
    - assets/images/ui/
    - assets/images/vehicles/
    - assets/images/weapons/
    - assets/videos/
    - assets/videos/garage/
    - assets/videos/marina/
    - assets/videos/prostitution/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

  fonts:
    - family: FontAwesomeSolid
      fonts:
        - asset: fonts/fa-solid-900.ttf
          weight: 900
    - family: FontAwesomeRegular
      fonts:
        - asset: fonts/fa-regular-400.ttf
          weight: 400
    - family: FontAwesomeLight
      fonts:
        - asset: fonts/fa-light-300.ttf
          weight: 300
    - family: FontAwesomeThin
      fonts:
        - asset: fonts/fa-thin-100.ttf
          weight: 100
    - family: FontAwesomeDuotone
      fonts:
        - asset: fonts/fa-duotone-900.ttf
          weight: 900
    - family: FontAwesomeBrands
      fonts:
        - asset: fonts/fa-brands-400.ttf
          weight: 400
    - family: FontAwesomeSharpSolid
      fonts:
        - asset: fonts/fa-sharp-solid-900.ttf
          weight: 900
    - family: FontAwesomeSharpRegular
      fonts:
        - asset: fonts/fa-sharp-regular-400.ttf
          weight: 400
    - family: FontAwesomeSharpLight
      fonts:
        - asset: fonts/fa-sharp-light-300.ttf
          weight: 300
